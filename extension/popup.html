<!doctype html>
<html>
  <head>
    <title>Mental Health Signal Analysis</title>
    <script src="libs/chart.umd.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <h1>Mental Health Signal Analysis</h1>
      <div class="subtitle">
        Analyze visible social comments with your local private model API
      </div>
    </header>

    <button id="analyze" class="analyze-btn">Analyze Visible Comments</button>

    <section class="status-card" id="statusCard" data-tone="default">
      <div class="status-heading">Run Status</div>
      <div id="statusText" class="status-text">
        Analyze a supported page to see signal summaries, severity, and evidence.
      </div>
      <div id="runMeta" class="run-meta"></div>
    </section>

    <div id="resultsShell" class="results-shell hidden">
      <section class="summary hidden" id="summaryContainer">
        <div class="metric-card">
          <div class="metric-number" id="metricComments">0</div>
          <div class="metric-label">Comments</div>
        </div>
        <div class="metric-card">
          <div class="metric-number" id="metricConfidence">0%</div>
          <div class="metric-label">Avg Confidence</div>
        </div>
        <div class="metric-card">
          <div class="metric-number" id="metricUncertainty">unknown</div>
          <div class="metric-label">Uncertainty</div>
        </div>
      </section>

      <section class="signal-summary" id="signalSummary"></section>

      <div class="chart-container hidden"></div>

      <div class="filter-container hidden"></div>

      <section id="evidenceContainer" class="evidence-container hidden"></section>

      <div id="commentsContainer" class="comments-container hidden"></div>

      <div id="disclaimer" class="disclaimer"></div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
