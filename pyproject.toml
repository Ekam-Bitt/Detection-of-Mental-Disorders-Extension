[tool.black]
line-length = 88
target-version = ['py310']
exclude = '''
/(
    \.venv
    | venv
    | __pycache__
    | \.git
    | node_modules
    | extension
)/
'''

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
python_classes = ["Test*"]
addopts = "-v --tb=short"
